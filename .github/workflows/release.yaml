name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: app/package-lock.json

    - name: Install dependencies
      working-directory: ./app
      run: npm ci

    - name: Rebuild native dependencies
      working-directory: ./app
      run: npm rebuild better-sqlite3

    - name: Run tests
      working-directory: ./app
      run: npm test

    - name: Build
      working-directory: ./app
      run: npm run build

    - name: Create distribution package
      working-directory: ./app
      run: |
        mkdir -p release
        cp -r dist release/
        cp package.json release/
        cp package-lock.json release/
        cp -r db release/ || mkdir release/db
        cd release
        tar -czf ../terrakko-${{ github.ref_name }}.tar.gz .

    - name: Generate changelog
      id: changelog
      run: |
        # Get the latest release tag
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 ${{ github.ref_name }}^ 2>/dev/null || echo "")

        if [ -z "$PREVIOUS_TAG" ]; then
          # First release
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
        else
          # Generate changelog from previous tag
          CHANGELOG=$(git log ${PREVIOUS_TAG}..${{ github.ref_name }} --pretty=format:"- %s (%h)" --no-merges)
        fi

        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: |
          # Terrakko ${{ github.ref_name }}

          ## What's Changed
          ${{ steps.changelog.outputs.changelog }}

          ## Installation

          ```bash
          # Extract release package
          tar -xzf terrakko-${{ github.ref_name }}.tar.gz

          # Install dependencies
          npm ci --production

          # Create .env file with your configuration
          cp .env.example .env

          # Start the bot
          npm start
          ```

          ## Full Changelog
          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for detailed changes.

          ---
          **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ steps.changelog.outputs.previous_tag }}...${{ github.ref_name }}
        files: |
          app/terrakko-${{ github.ref_name }}.tar.gz
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      continue-on-error: true

    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Build and push Docker image
      working-directory: ./app
      run: |
        if [ -f "Dockerfile" ]; then
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag terrakko/terrakko:${{ steps.version.outputs.VERSION }} \
            --tag terrakko/terrakko:latest \
            --push \
            .
          echo "✅ Docker image built and pushed"
        else
          echo "⚠️ No Dockerfile found, skipping Docker build"
        fi
      continue-on-error: true

  notify-release:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: [create-release, build-docker]
    if: always()

    steps:
    - name: Send notification
      run: |
        echo "Release ${{ github.ref_name }} completed!"
        echo "Create Release: ${{ needs.create-release.result }}"
        echo "Docker Build: ${{ needs.build-docker.result }}"
