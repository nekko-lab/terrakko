name: Pull Request Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr-validation:
    name: PR Validation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check PR title
      run: |
        PR_TITLE="${{ github.event.pull_request.title }}"
        echo "PR Title: $PR_TITLE"

        # Check if PR title follows conventional commits
        if echo "$PR_TITLE" | grep -qE "^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\(.+\))?: .+"; then
          echo "✅ PR title follows conventional commits"
        else
          echo "⚠️ PR title should follow conventional commits format"
          echo "Examples: feat: add new feature, fix: resolve bug, docs: update README"
        fi

    - name: Check for merge conflicts
      run: |
        git fetch origin ${{ github.base_ref }}
        if git merge-tree $(git merge-base HEAD origin/${{ github.base_ref }}) HEAD origin/${{ github.base_ref }} | grep -q "<<<<<"; then
          echo "❌ Merge conflicts detected"
          exit 1
        else
          echo "✅ No merge conflicts"
        fi

  quick-test:
    name: Quick Test (Node 20.x)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: app/package-lock.json

    - name: Install dependencies
      working-directory: ./app
      run: npm ci

    - name: Rebuild native dependencies
      working-directory: ./app
      run: npm rebuild better-sqlite3

    - name: Run tests
      working-directory: ./app
      run: npm test

    - name: Build
      working-directory: ./app
      run: npm run build

  code-review:
    name: Automated Code Review
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: app/package-lock.json

    - name: Install dependencies
      working-directory: ./app
      run: npm ci

    - name: Check for TODO comments
      run: |
        echo "Checking for TODO comments..."
        TODO_COUNT=$(grep -r "TODO" app/src --include="*.ts" | wc -l || true)
        FIXME_COUNT=$(grep -r "FIXME" app/src --include="*.ts" | wc -l || true)

        echo "Found $TODO_COUNT TODO comments"
        echo "Found $FIXME_COUNT FIXME comments"

        if [ $TODO_COUNT -gt 0 ] || [ $FIXME_COUNT -gt 0 ]; then
          echo "⚠️ Consider addressing TODO/FIXME comments before merging"
          grep -rn "TODO\|FIXME" app/src --include="*.ts" || true
        fi

    - name: Check file sizes
      run: |
        echo "Checking for large files..."
        find app/src -name "*.ts" -size +500k -exec ls -lh {} \; | while read line; do
          echo "⚠️ Large file found: $line"
          echo "Consider splitting into smaller modules"
        done

    - name: Check test coverage requirement
      working-directory: ./app
      run: |
        npm run test:coverage || true

        if [ -f "coverage/coverage-summary.json" ]; then
          COVERAGE=$(jq '.total.lines.pct' coverage/coverage-summary.json)
          echo "Current test coverage: $COVERAGE%"

          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "⚠️ Test coverage is below 70%"
            echo "Consider adding more tests"
          else
            echo "✅ Test coverage is acceptable"
          fi
        fi

  comment-summary:
    name: Comment PR Summary
    runs-on: ubuntu-latest
    needs: [pr-validation, quick-test, code-review]
    if: always()

    steps:
    - name: Create PR comment
      uses: actions/github-script@v7
      with:
        script: |
          const prNumber = context.payload.pull_request.number;
          const testResult = '${{ needs.quick-test.result }}';
          const validationResult = '${{ needs.pr-validation.result }}';
          const reviewResult = '${{ needs.code-review.result }}';

          let emoji = '✅';
          let status = 'All checks passed!';

          if (testResult !== 'success' || validationResult !== 'success') {
            emoji = '❌';
            status = 'Some checks failed';
          } else if (reviewResult !== 'success') {
            emoji = '⚠️';
            status = 'Checks passed with warnings';
          }

          const comment = `## ${emoji} PR Check Results

          | Check | Status |
          |-------|--------|
          | PR Validation | ${validationResult === 'success' ? '✅' : '❌'} |
          | Quick Test | ${testResult === 'success' ? '✅' : '❌'} |
          | Code Review | ${reviewResult === 'success' ? '✅' : '⚠️'} |

          **Overall Status:** ${status}

          ---
          *Automated check by GitHub Actions*`;

          github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
            body: comment
          });
