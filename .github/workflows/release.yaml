name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Release and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: read
      models: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=${PREV}" >> "$GITHUB_OUTPUT"
          echo "Previous tag: ${PREV}"

      - name: Resolve bump type from PR labels
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUMP="patch"
          LABELS=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '[.[].labels[].name] | join(" ")' 2>/dev/null || echo "")
          echo "Labels: [${LABELS}]"
          if echo " ${LABELS} " | grep -qw "major"; then
            BUMP="major"
          elif echo " ${LABELS} " | grep -qw "minor"; then
            BUMP="minor"
          fi
          echo "bump_type=${BUMP}" >> "$GITHUB_OUTPUT"
          echo "Bump type: ${BUMP}"

      - name: Compute new version
        id: version
        run: |
          PREV="${{ steps.prev_tag.outputs.tag }}"
          BUMP="${{ steps.bump.outputs.bump_type }}"
          VERSION="${PREV#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          case "$BUMP" in
            major) NEW="v$((MAJOR + 1)).0.0" ;;
            minor) NEW="v${MAJOR}.$((MINOR + 1)).0" ;;
            *)     NEW="v${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac
          echo "new_tag=${NEW}" >> "$GITHUB_OUTPUT"
          echo "New tag: ${NEW}"

      - name: Check existing release and image
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.new_tag }}"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          IMAGE_COUNT=$(gh api \
            "orgs/${OWNER}/packages/container/${REPO}/versions" \
            --jq "[.[].metadata.container.tags[] | select(. == \"${TAG}\")] | length" \
            2>/dev/null || echo "0")
          if [ "${IMAGE_COUNT}" -gt "0" ]; then
            echo "::error::Image ${TAG} already exists in GHCR. Aborting."
            exit 1
          fi

          if gh release view "${TAG}" &>/dev/null; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${TAG} already exists — skipping tag and release creation."
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: docker_push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.new_tag }}
            ghcr.io/${{ github.repository }}:latest
          build-args: |
            lang=C
            dir=src

      - name: Create and push tag
        if: steps.check.outputs.release_exists != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.new_tag }}"
          git push origin "${{ steps.version.outputs.new_tag }}"

      - name: Collect PRs and generate AI release notes
        id: notes
        if: steps.check.outputs.release_exists != 'true'
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const prevTag = '${{ steps.prev_tag.outputs.tag }}';
            const newTag  = '${{ steps.version.outputs.new_tag }}';

            let commits = [];
            try {
              const { data } = await github.rest.repos.compareCommits({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                base:  prevTag,
                head:  context.sha,
              });
              commits = data.commits;
            } catch (e) {
              core.warning(`compareCommits failed: ${e.message}`);
            }

            const seen = new Set();
            const prs  = [];
            for (const commit of commits) {
              try {
                const { data: associated } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner:      context.repo.owner,
                  repo:       context.repo.repo,
                  commit_sha: commit.sha,
                });
                for (const pr of associated) {
                  if (!seen.has(pr.number)) {
                    seen.add(pr.number);
                    prs.push({
                      number: pr.number,
                      title:  pr.title,
                      body:   (pr.body || '').slice(0, 300),
                      labels: pr.labels.map(l => l.name),
                    });
                  }
                }
              } catch (e) {
                core.warning(`Could not get PRs for ${commit.sha}: ${e.message}`);
              }
            }

            if (prs.length === 0) {
              core.info('No PRs found — skipping AI generation.');
              core.setOutput('body', '');
              return;
            }

            const prText = prs.map(pr =>
              `#${pr.number} [${pr.labels.join(', ') || 'no label'}] ${pr.title}\n${pr.body}`
            ).join('\n\n');

            try {
              const res = await fetch('https://models.inference.ai.azure.com/chat/completions', {
                method:  'POST',
                headers: {
                  'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                  'Content-Type':  'application/json',
                },
                body: JSON.stringify({
                  model: 'gpt-4o-mini',
                  messages: [
                    {
                      role:    'system',
                      content: 'You are a technical writer for an open-source project. Generate release notes in Markdown from the PR list. Group by: ## New Features, ## Bug Fixes, ## Maintenance. Omit empty sections. Be concise and user-focused.',
                    },
                    {
                      role:    'user',
                      content: `Version: ${newTag}\n\nMerged PRs:\n${prText}`,
                    },
                  ],
                  max_tokens: 800,
                }),
              });

              if (res.ok) {
                const data = await res.json();
                core.setOutput('body', data.choices[0].message.content);
                return;
              }
              core.warning(`GitHub Models returned ${res.status} — falling back to auto-generated notes.`);
            } catch (e) {
              core.warning(`GitHub Models failed: ${e.message} — falling back to auto-generated notes.`);
            }

            core.setOutput('body', '');

      - name: Create GitHub Release
        if: steps.check.outputs.release_exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTES_BODY: ${{ steps.notes.outputs.body }}
        run: |
          TAG="${{ steps.version.outputs.new_tag }}"
          if [ -n "$NOTES_BODY" ]; then
            printf '%s' "$NOTES_BODY" > /tmp/notes.txt
            gh release create "$TAG" --title "$TAG" --notes-file /tmp/notes.txt
          else
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
