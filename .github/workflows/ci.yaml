name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, feat/* ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: app/package-lock.json

    - name: Install dependencies
      working-directory: ./app
      run: npm ci

    - name: Rebuild native dependencies
      working-directory: ./app
      run: npm rebuild better-sqlite3

    - name: Run tests
      working-directory: ./app
      run: npm test

    - name: Generate coverage report
      working-directory: ./app
      run: npm run test:coverage

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./app/coverage/coverage-final.json
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: app/package-lock.json

    - name: Install dependencies
      working-directory: ./app
      run: npm ci

    - name: Rebuild native dependencies
      working-directory: ./app
      run: npm rebuild better-sqlite3

    - name: Build TypeScript
      working-directory: ./app
      run: npm run build

    - name: Check build output
      working-directory: ./app
      run: |
        if [ ! -d "dist" ]; then
          echo "Error: dist directory not found"
          exit 1
        fi
        echo "Build successful - dist directory created"
        ls -la dist/

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-node-${{ matrix.node-version }}
        path: app/dist/
        retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: app/package-lock.json

    - name: Install dependencies
      working-directory: ./app
      run: npm ci

    - name: Check TypeScript types
      working-directory: ./app
      run: npx tsc --noEmit

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: app/package-lock.json

    - name: Run npm audit
      working-directory: ./app
      run: npm audit --audit-level=moderate
      continue-on-error: true

    - name: Check for known vulnerabilities
      working-directory: ./app
      run: |
        AUDIT_RESULT=$(npm audit --json)
        echo "$AUDIT_RESULT"
        VULNERABILITIES=$(echo "$AUDIT_RESULT" | jq '.metadata.vulnerabilities.total')
        if [ "$VULNERABILITIES" -gt 0 ]; then
          echo "Warning: Found $VULNERABILITIES vulnerabilities"
        else
          echo "No vulnerabilities found"
        fi

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      working-directory: ./app
      run: |
        if [ -f "Dockerfile" ]; then
          docker build -t terrakko:test .
          echo "Docker build successful"
        else
          echo "No Dockerfile found, skipping Docker build"
        fi

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [test, build, lint, security]
    if: always()

    steps:
    - name: Check job results
      run: |
        echo "Test job: ${{ needs.test.result }}"
        echo "Build job: ${{ needs.build.result }}"
        echo "Lint job: ${{ needs.lint.result }}"
        echo "Security job: ${{ needs.security.result }}"

        if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.build.result }}" != "success" ]; then
          echo "❌ CI pipeline failed"
          exit 1
        else
          echo "✅ CI pipeline passed"
        fi
