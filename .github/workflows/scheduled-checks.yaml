name: Scheduled Checks

on:
  schedule:
    # Run every day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  dependency-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: app/package-lock.json

    - name: Install dependencies
      working-directory: ./app
      run: npm ci

    - name: Run security audit
      working-directory: ./app
      run: |
        echo "Running npm audit..."
        npm audit --json > audit-report.json || true

        echo "## Security Audit Report" > audit-summary.md
        echo "" >> audit-summary.md

        CRITICAL=$(jq '.metadata.vulnerabilities.critical' audit-report.json)
        HIGH=$(jq '.metadata.vulnerabilities.high' audit-report.json)
        MODERATE=$(jq '.metadata.vulnerabilities.moderate' audit-report.json)
        LOW=$(jq '.metadata.vulnerabilities.low' audit-report.json)

        echo "| Severity | Count |" >> audit-summary.md
        echo "|----------|-------|" >> audit-summary.md
        echo "| Critical | $CRITICAL |" >> audit-summary.md
        echo "| High | $HIGH |" >> audit-summary.md
        echo "| Moderate | $MODERATE |" >> audit-summary.md
        echo "| Low | $LOW |" >> audit-summary.md

        cat audit-summary.md

    - name: Check for outdated dependencies
      working-directory: ./app
      run: |
        echo "Checking for outdated dependencies..."
        npm outdated || true

    - name: Upload audit report
      uses: actions/upload-artifact@v4
      with:
        name: security-audit-report
        path: app/audit-report.json
        retention-days: 30

  test-matrix:
    name: Extended Test Matrix
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18.x, 20.x, 22.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: app/package-lock.json

    - name: Install dependencies
      working-directory: ./app
      run: npm ci

    - name: Rebuild native dependencies
      working-directory: ./app
      run: npm rebuild better-sqlite3

    - name: Run tests
      working-directory: ./app
      run: npm test

    - name: Build
      working-directory: ./app
      run: npm run build

  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: app/package-lock.json

    - name: Install dependencies
      working-directory: ./app
      run: npm ci

    - name: Run tests with coverage
      working-directory: ./app
      run: npm run test:coverage

    - name: Check coverage threshold
      working-directory: ./app
      run: |
        if [ -f "coverage/coverage-summary.json" ]; then
          LINES_PCT=$(jq '.total.lines.pct' coverage/coverage-summary.json)
          STATEMENTS_PCT=$(jq '.total.statements.pct' coverage/coverage-summary.json)
          FUNCTIONS_PCT=$(jq '.total.functions.pct' coverage/coverage-summary.json)
          BRANCHES_PCT=$(jq '.total.branches.pct' coverage/coverage-summary.json)

          echo "Coverage Report:"
          echo "- Lines: $LINES_PCT%"
          echo "- Statements: $STATEMENTS_PCT%"
          echo "- Functions: $FUNCTIONS_PCT%"
          echo "- Branches: $BRANCHES_PCT%"

          MIN_COVERAGE=70

          if (( $(echo "$LINES_PCT < $MIN_COVERAGE" | bc -l) )); then
            echo "❌ Line coverage ($LINES_PCT%) is below threshold ($MIN_COVERAGE%)"
            exit 1
          fi

          echo "✅ Coverage is above threshold"
        fi

    - name: Check code complexity
      working-directory: ./app
      run: |
        echo "Checking for overly complex files..."
        find src -name "*.ts" | while read file; do
          LINES=$(wc -l < "$file")
          if [ $LINES -gt 500 ]; then
            echo "⚠️ $file has $LINES lines (consider refactoring if > 500)"
          fi
        done

  integration-test:
    name: Integration Test (Simulation)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: app/package-lock.json

    - name: Install dependencies
      working-directory: ./app
      run: npm ci

    - name: Rebuild native dependencies
      working-directory: ./app
      run: npm rebuild better-sqlite3

    - name: Build
      working-directory: ./app
      run: npm run build

    - name: Simulate bot startup
      working-directory: ./app
      run: |
        # Create test .env file
        cat > .env << EOF
        DOMAIN=".test.local"
        PVE_HOST="127.0.0.1"
        PVE_USER="test@pve"
        PVE_PASS="test"
        PVE_REGION=["test"]
        PVE_TEMP_ID=["999"]
        PVE_TOKEN="test"
        PVE_SECRET="test-secret"
        DIS_TOKEN="test-token"
        DIS_CHANNEL_ID=12345
        EOF

        echo "✅ Test environment prepared"

  summary:
    name: Scheduled Check Summary
    runs-on: ubuntu-latest
    needs: [dependency-audit, test-matrix, code-quality, integration-test]
    if: always()

    steps:
    - name: Generate summary
      run: |
        echo "# Daily Check Summary"
        echo ""
        echo "| Job | Status |"
        echo "|-----|--------|"
        echo "| Dependency Audit | ${{ needs.dependency-audit.result }} |"
        echo "| Test Matrix | ${{ needs.test-matrix.result }} |"
        echo "| Code Quality | ${{ needs.code-quality.result }} |"
        echo "| Integration Test | ${{ needs.integration-test.result }} |"
